name: MCP Server Request
description: Submit a new MCP (Model Context Protocol) server for review and approval.
title: "[MCP Request]"
labels:
  - mcp-request
  - pending-review
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## MCP Server Registration Request

        Submit the MCP endpoint and a short reason for the request.
        Automated review starts after the issue is created.

  - type: input
    id: server_url
    attributes:
      label: MCP Endpoint
      description: The public HTTPS endpoint where the MCP server is hosted
      placeholder: "https://your-mcp-server.example.com/mcp"
    validations:
      required: true

  - type: textarea
    id: request_reason
    attributes:
      label: Request Reason
      description: Why this MCP server should be reviewed and approved
      placeholder: "We want to make this MCP server available to internal agents."
    validations:
      required: true
